<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Punta Cana Going Dashboard</title>
  <link rel="stylesheet" href="styles.css">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PCG Tours">
  <link rel="apple-touch-icon" href="assets/icon-192.png">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
</head>
<body>

  <!-- LOGIN -->
  <div id="loginScreen" class="login-screen">
    <div class="login-box">
      <img src="assets/logo.png" alt="Punta Cana Going Tours" class="login-logo">

      <h2>Acceso Punta Cana Going</h2>

      <input type="text" id="username" placeholder="Usuario" autocapitalize="off" autocomplete="off">
      <input type="password" id="password" placeholder="Contraseña" autocapitalize="off" autocomplete="off">

      <button onclick="login()">Entrar</button>

      <p id="loginError" style="color:red; display:none;">Datos incorrectos</p>
    </div>
  </div>

  <!-- APP -->
  <div id="app" style="display:none;">
    <div class="sidebar" id="sidebar">
      <div class="logo">
        <img src="assets/logo.png" alt="Punta Cana Going Tours" class="sidebar-logo">
      </div>

      <a href="#" class="menu-item active">Reservas</a>
      <a href="#" class="menu-item">Nueva Reserva</a>
      <a href="#" class="menu-item">Nuevo Producto</a>
      <a href="#" class="menu-item">Reportes</a>
      <a href="#" class="menu-item">Usuarios</a>

      <button onclick="logout()">Cerrar sesión</button>
    </div>

    <div class="main" id="main">
      <button id="toggleBtn">☰</button>

      <div id="content">
        <h1>Dashboard</h1>
        <p>Bienvenido a Punta Cana Going</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
